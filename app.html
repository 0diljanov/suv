<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>AquaFlow — Панель управления</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0a0e1a">
<meta name="color-scheme" content="dark">

<!-- iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AquaFlow">
<link rel="apple-touch-icon" href="./assets/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/icon-180.png">

<link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="64x64" href="./assets/icons/favicon-64.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin>
<link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

<div class="app" id="app-root"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
<script src="./assets/js/i18n.js"></script>
<script src="./assets/js/data.js"></script>
<script src="./assets/js/app.js"></script>
<script>
  // Регистрация Service Worker (PWA, офлайн-режим)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>
